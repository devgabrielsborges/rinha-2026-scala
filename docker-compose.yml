services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha

  api1:
    build: .
    hostname: api1
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/app/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      - rinha

  api2:
    build: .
    hostname: api2
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/app/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      - rinha

networks:
  rinha:
    driver: bridge
