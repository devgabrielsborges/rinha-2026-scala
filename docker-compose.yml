services:
  api1:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    hostname: api1
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/app/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

  api2:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    hostname: api2
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/app/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

  nginx:
    image: nginx:alpine
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"
