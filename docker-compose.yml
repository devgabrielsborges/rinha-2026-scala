services:
  init:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /app/index/* /shared/index/"]
    volumes:
      - shared-index:/shared/index
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "6MB"

  api1:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    hostname: api1
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - shared-index:/shared/index:ro
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/shared/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "164MB"

  api2:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    hostname: api2
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - shared-index:/shared/index:ro
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/shared/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "164MB"

  nginx:
    image: nginx:alpine
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "10MB"

volumes:
  shared-index:
