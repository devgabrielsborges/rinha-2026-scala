services:
  init:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /app/index/* /shared/index/"]
    volumes:
      - shared-index:/shared/index
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "6MB"

  api1:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    hostname: api1
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - shared-index:/shared/index:ro
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/shared/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "165MB"

  api2:
    image: ghcr.io/devgabrielsborges/rinha-2026-scala:latest
    hostname: api2
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - shared-index:/shared/index:ro
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/shared/index
      - IVF_NPROBE=5
      - HTTP_PORT=8080
      - HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "165MB"

  nginx:
    image: nginx:alpine
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "15MB"

volumes:
  shared-index:
