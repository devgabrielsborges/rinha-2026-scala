services:
  api:
    build: .
    ports:
      - "9999:9999"
    environment:
      - DATA_DIR=/app/data
      - INDEX_DIR=/app/index
      - IVF_NPROBE=5
      - HTTP_PORT=9999
      - HTTP_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "350MB"
