worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 64;
    }

    server {
        listen 9999;
        access_log off;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
