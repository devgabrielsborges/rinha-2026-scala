repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: scalafmt-check
        name: scalafmt check
        entry: sbt "scalafmtCheckAll; scalafmtSbtCheck"
        language: system
        pass_filenames: false
        files: \.(scala|sbt)$

      - id: scalafix-check
        name: scalafix lint (unused code, redundant syntax)
        entry: sbt "scalafixAll --check"
        language: system
        pass_filenames: false
        files: \.scala$
